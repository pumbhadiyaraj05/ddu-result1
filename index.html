<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDU Portal</title>
<link rel="stylesheet" href="reg.css">
</head>

<body>

<div class="main-container">

    <form id="studentForm" class="form-card">

        <h1>🎓 DDU Student Portal</h1>
        <p class="subtitle">Smart Registration System</p>

        <div class="grid">

            <!-- Personal -->
            <div class="card">
                <h3>👤 Personal Info</h3>

                <div class="field">
                    <label>Full Name</label>
                    <input type="text" id="name" required>
                </div>

                <div class="field">
                    <label>Date of Birth</label>
                    <input type="date" id="dob" required>
                </div>

                <div class="field">
                    <label>Gender</label>
                    <select id="gender">
                        <option>Male</option>
                        <option>Female</option>
                        <option>Others</option>
                    </select>
                </div>
            </div>

            <!-- Academic -->
            <div class="card">
                <h3>📘 Academic</h3>

                <div class="field">
                    <label>Enrollment No</label>
                    <input type="text" id="enroll" required>
                </div>

                <div class="field">
                    <label>Seat No</label>
                    <input type="text" id="seat" required>
                </div>

                <div class="field">
                    <label>Branch</label>
                    <select id="branch">
                        <option>IT</option>
                        <option>CSE</option>
                        <option>EC</option>
                        <option>Mechanical</option>
                        <option>Chemical</option>
                    </select>
                </div>

                <div class="field">
                    <label>Semester</label>
                    <input type="text" id="semester" required>
                </div>
            </div>

            <!-- Contact -->
            <div class="card">
                <h3>📞 Contact</h3>

                <div class="field">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>

                <div class="field">
                    <label>Mobile</label>
                    <input type="tel" id="mobile" required>
                </div>

                <div class="field">
                    <label>City</label>
                    <input type="text" id="city">
                </div>
            </div>

            <!-- Other -->
            <div class="card">
                <h3>📊 Other</h3>

                <div class="field">
                    <label>Father Name</label>
                    <input type="text" id="father">
                </div>

                <div class="field">
                    <label>Category</label>
                    <select id="category">
                        <option>General</option>
                        <option>OBC</option>
                        <option>SC/ST</option>
                    </select>
                </div>

                <div class="field">
                    <label>JEE Percentile</label>
                    <input type="text" id="jee">
                </div>
            </div>

        </div>

        <button type="submit">🚀 Generate Result</button>

    </form>

</div>

<script>
document.getElementById("studentForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const fields = ["name","dob","gender","enroll","seat","branch",
                    "semester","email","mobile","city","father",
                    "category","jee"];

    fields.forEach(id => {
        localStorage.setItem(id, document.getElementById(id).value);
    });

    window.location.href = "result.html";
});
</script>

</body>
</html>
